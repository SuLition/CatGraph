<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/logos/cat-logo-ink-filled.svg" />
    <title>CatGraph</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: transparent;
      }
      #boot-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background:
          radial-gradient(
            120% 90% at 18% 12%,
            #e8f3f6 0%,
            rgba(232, 243, 246, 0) 55%
          ),
          radial-gradient(
            130% 100% at 82% 92%,
            #f6efe2 0%,
            rgba(246, 239, 226, 0) 60%
          ),
          linear-gradient(135deg, #ecf2f3 0%, #f3eee2 100%);
        animation: boot-fade-in 240ms ease-out;
      }
      #boot-loader.is-hiding {
        animation: boot-fade-out 200ms ease-in forwards;
      }
      #boot-loader img {
        width: 56px;
        height: 56px;
        animation: boot-breath 1800ms ease-in-out infinite;
      }
      @keyframes boot-breath {
        0%, 100% { transform: scale(0.96); opacity: 0.78; }
        50%      { transform: scale(1.04); opacity: 1; }
      }
      @keyframes boot-fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes boot-fade-out {
        from { opacity: 1; }
        to   { opacity: 0; }
      }
    </style>
  </head>
  <body>
    <div id="boot-loader" aria-hidden="true">
      <img src="/logos/cat-logo-ink-filled.svg" alt="" />
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
